<!DOCTYPE html>
<html>

<head>
<style>
  .dropdown{
      position:relative;
      display: flex;
      align-items: center;
  }
  .dropdownContent{
      position: relative;
      background-color: bisque;
      border: 1px solid black;
      box-shadow: 0 4px 8 px 0;
      min-width: 100;;
      padding: 10px;
      z-index: 1;
      font-size: 36px;
  }
  
</style>
</head>

<body>
  <h1>Coworker Score test</h1>
    <div class = dropdown>
      <div id = "dropdownElements" class = "dropdownContent">
          <ol start=" 1">
                <li> <input type="checkbox" id="1"> <label for="1"> Held hands romantically? </label> </li> 
            </ol>
      </div>
    </div>

    <div>
      <>

    </div>
    <h1 id="count" hidden>Result</h1>
  <button id ="submit">Submit</button>
  
</body>


  <script>
    const numQuestions = document.querySelectorAll('#dropdownElements input').length
    var complete = false;

    const MyButton = document.getElementById("submit");
    MyButton.addEventListener('click', function() {
        if(complete === false){
          countSelectedCheckboxes();
          document.getElementById("count").removeAttribute("hidden");
          document.getElementById("dropdownElements").setAttribute("hidden", "hidden");
          document.getElementById("submit").innerHTML = "Reset";
          complete = true;
        }else {
          document.getElementById("count").setAttribute("hidden", "hidden");
          document.getElementById("dropdownElements").removeAttribute("hidden");
          document.getElementById("submit").innerHTML = "Submit";
          complete = false;
        }
    })

    function countSelectedCheckboxes(){
      document.getElementById("count").setAttribute("hidden", "hidden");
      document.getElementById("dropdownElements").removeAttribute("hidden");
      document.getElementById("submit").innerHTML = "Submit";
      complete = false;


      var checkboxes = document.querySelectorAll('#dropdownElements input[type="checkbox"]');
      var count = 0;
      checkboxes.forEach(function(checkbox){
          if(checkbox.checked){
            count++;
          }
      });
      var selectedCountLabel = document.getElementById(id="count");
      selectedCountLabel.innerHTML="Coworker score:" + ((count /  numQuestions) * 100) + "%";
    }
</script>


</html>
